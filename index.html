<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#07070e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Snake FOK">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="side-info">
    <div id="topbar">
        <button id="btn-mute" title="Toggle music (M)" style="visibility:hidden"><canvas id="btn-mute-cv" width="32" height="16"></canvas></button>
        <span id="fps-el" style="visibility:hidden"></span>
    </div>
    <div id="hud" class="hidden">
        <div class="hud-row">
            <span><span class="hl">LEVEL </span><span class="hv" id="hv-lvl">1</span></span>
            <span id="lives-group"><span class="hl">LIVES </span><canvas id="hv-lives-cv" width="48" height="12"></canvas></span>
        </div>
        <div class="hud-row">
            <span><span class="hl">GEMS </span><span class="hv-wrap"><span class="hv" id="hv-gems">0</span><span class="hl">/10</span></span></span>
            <span><span class="hl">SCORE </span><span class="hv" id="hv-score">0</span></span>
        </div>
    </div>
</div>
<div id="wrap">
    <canvas id="c"></canvas>
</div>
<div id="gamepad">
    <button class="sbtn" id="btn-esc">ESC</button>
    <button class="sbtn" id="btn-ok">A: OK</button>
    <canvas id="dpad-c" width="150" height="150"></canvas>
    <button class="sbtn" id="btn-pause">||</button>
    <button class="sbtn" id="btn-start">START</button>
</div>
<input id="name-inp" type="text" autocomplete="off" autocorrect="off"
       autocapitalize="characters" spellcheck="false" inputmode="text">
<script src="assets.js"></script>
<script src="audio.js"></script>
<script src="game.js"></script>
</body>
</html>
