<svg width="48" height="48" xmlns="http://www.w3.org/2000/svg">
  <rect width="48" height="48" rx="5" fill="#07070e"/>
  <!-- HEART_PX pixel art: 7x6, 5px per pixel, offset (7,9) -->
  <!-- Row 0: 0,1,1,0,1,1,0 -->
  <rect x="12" y="9"  width="5" height="5" fill="#ff2266"/>
  <rect x="17" y="9"  width="5" height="5" fill="#ff2266"/>
  <rect x="27" y="9"  width="5" height="5" fill="#ff2266"/>
  <rect x="32" y="9"  width="5" height="5" fill="#ff2266"/>
  <!-- Row 1: 1,1,1,1,1,1,1 -->
  <rect x="7"  y="14" width="35" height="5" fill="#ff2266"/>
  <!-- Row 2: 1,1,1,1,1,1,1 -->
  <rect x="7"  y="19" width="35" height="5" fill="#ff2266"/>
  <!-- Row 3: 0,1,1,1,1,1,0 -->
  <rect x="12" y="24" width="25" height="5" fill="#ff2266"/>
  <!-- Row 4: 0,0,1,1,1,0,0 -->
  <rect x="17" y="29" width="15" height="5" fill="#ff2266"/>
  <!-- Row 5: 0,0,0,1,0,0,0 -->
  <rect x="22" y="34" width="5"  height="5" fill="#ff2266"/>
</svg>
