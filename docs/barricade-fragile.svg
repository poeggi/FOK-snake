<svg width="48" height="48" xmlns="http://www.w3.org/2000/svg">
  <rect width="48" height="48" rx="5" fill="#07070e"/>
  <!-- Body -->
  <rect x="4" y="13" width="40" height="22" fill="#7a6050"/>
  <!-- Mortar/crack lines -->
  <rect x="4"  y="23" width="40" height="1"  fill="#4a3a2a"/>
  <rect x="23" y="13" width="1"  height="10" fill="#4a3a2a"/>
  <rect x="23" y="24" width="1"  height="11" fill="#4a3a2a"/>
  <!-- Faded bevel highlight -->
  <rect x="4"  y="13" width="40" height="2"  fill="#aa9080"/>
  <rect x="4"  y="13" width="2"  height="22" fill="#aa9080"/>
  <!-- Faded bevel shadow -->
  <rect x="42" y="13" width="2"  height="22" fill="#332820"/>
  <rect x="4"  y="33" width="40" height="2"  fill="#332820"/>
  <!-- Diagonal cracks -->
  <line x1="7"  y1="15" x2="41" y2="32" stroke="#2a1a0a" stroke-width="1.2"/>
  <line x1="39" y1="15" x2="9"  y2="27" stroke="#2a1a0a" stroke-width="1.2"/>
</svg>
