<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#07070e" rx="80"/>
  <!-- Snake body: S-curve path, network-first green -->
  <path d="M128 176 H352 Q400 176 400 224 V256 Q400 304 352 304 H160 Q112 304 112 352 V368 Q112 416 160 416 H352"
        stroke="#4db84d" stroke-width="76" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Head (brighter circle at endpoint) -->
  <circle cx="352" cy="416" r="46" fill="#7fff7f"/>
  <!-- Eyes (facing right) -->
  <circle cx="370" cy="399" r="9" fill="#001500"/>
  <circle cx="370" cy="433" r="9" fill="#001500"/>
  <!-- Gem (cyan diamond in the open space) -->
  <polygon points="220,208 250,240 220,272 190,240" fill="#00cccc"/>
  <polygon points="220,208 250,240 220,224" fill="#ffffff" opacity="0.45"/>
</svg>
